name: Deploy to Cloudflare Pages

# Auto-deploy on every push to main (incl. Sveltia CMS commits from /admin).
# Keeps the existing direct-upload "kurasv2" project + kurasbuku.com domain
# intact — no project recreation, no downtime.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: d52d9daab552d420a5784ccd36b52435
          command: pages deploy dist --project-name=kurasv2 --branch=main
