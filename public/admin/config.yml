          - { label: 'CTA: butang kedua', name: ctaSecondary, widget: string }

      - name: tentangPage
        label: Halaman Tentang
        file: src/content/data/pages/tentang.json
        fields:
          - { label: Tajuk Meta (SEO), name: metaTitle, widget: string }
          - { label: Hero eyebrow, name: heroEyebrow, widget: string }
          - { label: 'Hero tajuk baris 1', name: heroLine1, widget: string }
          - { label: 'Hero tajuk baris emas', name: heroAccent, widget: string }
          - { label: Hero sub, name: heroSub, widget: text }
