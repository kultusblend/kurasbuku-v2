# Sveltia CMS — Penerbitan Kuras Buku (V2)
# Login via GitHub OAuth proxy (shared Cloudflare Worker).
# Editor (Hafiz) must be a collaborator on kultusblend/kurasbuku-v2.

backend:
  name: github
  repo: kultusblend/kurasbuku-v2
  branch: main
  base_url: https://sveltia-auth-sekolahpenulisan.azreehanifiah.workers.dev
  auth_endpoint: auth

site_url: https://kurasv2.pages.dev
display_url: https://kurasv2.pages.dev
logo_url: /logo.png

media_folder: public/uploads
public_folder: /uploads

# Local editing during dev: run `npx @sveltia/cms-proxy-server` then open /admin/
local_backend: true

editor:
  preview: false

i18n:
  locales: [ms]
  default_locale: ms

collections:
  # ---------- ARTIKEL (BLOG) ----------
  - name: blog
    label: Artikel
    label_singular: Artikel
    icon: article
    folder: src/content/blog
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    summary: '{{title}}'
    sortable_fields: [pubDate, title]
    media_folder: /public/uploads/artikel
    public_folder: /uploads/artikel
    fields:
      - { label: Tajuk, name: title, widget: string }
      - { label: Penerangan (SEO meta, ~155 aksara), name: description, widget: text }
      - { label: Tarikh terbit, name: pubDate, widget: datetime, format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false }
      - { label: Tarikh kemaskini, name: updatedDate, widget: datetime, format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false, required: false }
      - label: Kategori
        name: module
        widget: select
        default: umum
        options:
          - { label: Penerbitan, value: penerbitan }
          - { label: Penulisan, value: penulisan }
          - { label: 'Komunikasi & Penyampaian', value: komunikasi }
          - { label: 'Strategi & Pemasaran', value: strategik }
          - { label: Umum, value: umum }
      - label: Penulis
        name: author
        widget: relation
        collection: authors
        search_fields: [name]
        value_field: '{{slug}}'
        display_fields: [name]
        default: hafiz-latiff
        required: false
      - { label: Tag (kata kunci SEO), name: tags, widget: list, required: false }
      - { label: Ringkasan / TLDR, name: tldr, widget: text, required: false }
      - { label: Gambar utama, name: heroImage, widget: image, required: false }
      - { label: 'Draf (jangan terbit lagi)', name: draft, widget: boolean, default: true }
      - { label: Kandungan, name: body, widget: markdown }

  # ---------- PENULIS ----------
  - name: authors
    label: Penulis
    label_singular: Penulis
    icon: person
    folder: src/content/authors
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    summary: '{{name}}'
    fields:
      - { label: Nama, name: name, widget: string }
      - { label: Peranan, name: role, widget: string, required: false }
      - { label: Kelayakan, name: credentials, widget: string, required: false }
      - { label: E-mel, name: email, widget: string, required: false }
      - { label: Avatar, name: avatar, widget: image, required: false }
      - { label: Bio, name: bio, widget: text }

  # ---------- HALAMAN ----------
  - name: halaman
    label: Halaman (Ayat & Tajuk)
    icon: web
    files:
      - name: home
        label: Laman Utama
        file: src/content/data/pages/home.json
        description: Semua ayat di laman utama, mengikut bahagian.
        fields:
          - { label: Tajuk Meta (SEO), name: metaTitle, widget: string }
          - label: Hero (bahagian atas)
            name: hero
            widget: object
            fields:
              - { label: Eyebrow (label kecil), name: eyebrow, widget: string }
              - { label: 'Tajuk besar: baris 1', name: headlineLine1, widget: string }
              - { label: 'Tajuk besar: baris emas', name: headlineAccent, widget: string }
              - { label: Sub-tajuk, name: sub, widget: text }
              - { label: Butang utama, name: ctaPrimary, widget: string }
              - { label: Butang kedua, name: ctaSecondary, widget: string }
              - label: Statistik (3)
                name: stats
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Nilai, name: value, widget: string }
              - { label: Label badge, name: badgeLabel, widget: string }
              - { label: Nilai badge, name: badgeValue, widget: string }
              - { label: Unit badge, name: badgeUnit, widget: string }
              - { label: 'Alt gambar (untuk SEO/akses)', name: imageAlt, widget: string }
          - { label: Label bar logo klien, name: trustLabel, widget: string }
          - label: Seksyen Program
            name: programs
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Tajuk, name: heading, widget: string }
              - { label: Penerangan, name: lede, widget: text }
              - { label: Teks pautan kad, name: cardCta, widget: string }
          - label: Seksyen Metodologi
            name: methodology
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Tajuk, name: heading, widget: string }
              - { label: Penerangan, name: lede, widget: text }
              - { label: Aliran (4 langkah), name: flow, widget: list, field: { label: Langkah, name: item, widget: string } }
          - label: Seksyen Penerbitan Enterprise
            name: enterprise
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Tajuk, name: heading, widget: string }
              - { label: Penerangan, name: body, widget: text }
              - { label: Senarai servis, name: list, widget: list, field: { label: Servis, name: item, widget: string } }
              - { label: Teks butang, name: cta, widget: string }
              - { label: Alt gambar, name: imageAlt, widget: string }
          - label: Seksyen Akar Kepakaran (4 servis)
            name: legacy
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Tajuk, name: heading, widget: string }
              - { label: Penerangan, name: lede, widget: text }
              - label: Servis
                name: services
                widget: list
                summary: '{{fields.title}}'
                fields:
                  - { label: Nombor, name: num, widget: string }
                  - { label: 'Ikon (pen/layout/visual/print)', name: icon, widget: string }
                  - { label: Tajuk, name: title, widget: string }
                  - { label: Penerangan, name: desc, widget: text }
          - label: Seksyen Kajian Kes (tajuk)
            name: cases
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Tajuk, name: heading, widget: string }
              - { label: Penerangan, name: lede, widget: text }
          - label: Borang Permohonan
            name: leadgen
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Tajuk, name: heading, widget: string }
              - { label: Penerangan, name: body, widget: text }
              - { label: Poin kepercayaan, name: points, widget: list, field: { label: Poin, name: item, widget: string } }
              - { label: 'Label: Nama', name: labelName, widget: string }
              - { label: 'Label: E-mel', name: labelEmail, widget: string }
              - { label: 'Label: Organisasi', name: labelOrg, widget: string }
              - { label: 'Label: Jawatan', name: labelPosition, widget: string }
              - { label: 'Label: Bilangan peserta', name: labelPax, widget: string }
              - { label: 'Label: Program', name: labelProgram, widget: string }
              - { label: 'Label: Mesej', name: labelMessage, widget: string }
              - { label: Placeholder mesej, name: messagePlaceholder, widget: text }
              - { label: Teks butang hantar, name: submit, widget: string }
              - { label: Nota bawah borang, name: note, widget: text }

      - name: program
        label: Halaman Program (katalog)
        file: src/content/data/pages/program.json
        fields:
          - { label: Tajuk Meta (SEO), name: metaTitle, widget: string }
          - { label: Hero eyebrow, name: heroEyebrow, widget: string }
          - { label: 'Hero tajuk baris 1', name: heroLine1, widget: string }
          - { label: 'Hero tajuk baris emas', name: heroAccent, widget: string }
          - { label: Hero sub, name: heroSub, widget: text }
          - { label: Tag hero, name: heroTags, widget: list, field: { label: Tag, name: item, widget: string } }
          - { label: 'CTA: tajuk', name: ctaHeading, widget: string }
          - { label: 'CTA: penerangan', name: ctaBody, widget: text }
          - { label: 'CTA: butang utama', name: ctaPrimary, widget: string }
          - { label: 'CTA: butang kedua', name: ctaSecondary, widget: string }

      - name: penerbitan
        label: Halaman Penerbitan
        file: src/content/data/pages/penerbitan.json
        fields:
          - { label: Tajuk Meta (SEO), name: metaTitle, widget: string }
          - { label: Hero eyebrow, name: heroEyebrow, widget: string }
          - { label: 'Hero tajuk baris 1', name: heroLine1, widget: string }
          - { label: 'Hero tajuk baris emas', name: heroAccent, widget: string }
          - { label: Hero sub, name: heroSub, widget: text }
          - { label: 'Hero butang utama', name: ctaPrimary, widget: string }
          - { label: 'Hero butang kedua', name: ctaSecondary, widget: string }
          - { label: 'Servis: eyebrow', name: servicesEyebrow, widget: string }
          - { label: 'Servis: tajuk', name: servicesHeading, widget: string }
          - { label: 'Servis: penerangan', name: servicesLede, widget: text }
          - { label: 'Proses: eyebrow', name: workflowEyebrow, widget: string }
          - { label: 'Proses: tajuk', name: workflowHeading, widget: string }
          - { label: 'Use case: eyebrow', name: usecasesEyebrow, widget: string }
          - { label: 'Use case: tajuk', name: usecasesHeading, widget: string }
          - { label: 'Use case: penerangan', name: usecasesBody, widget: text }
          - { label: 'Use case: butang', name: usecasesCta, widget: string }
          - { label: 'CTA bawah: tajuk', name: ctaBandHeading, widget: string }
          - { label: 'CTA bawah: penerangan', name: ctaBandBody, widget: text }
          - { label: 'CTA bawah: butang utama', name: ctaBandPrimary, widget: string }
          - { label: 'CTA bawah: butang kedua', name: ctaBandSecondary, widget: string }

      - name: metodologiPage
        label: Halaman Metodologi
        file: src/content/data/pages/metodologi.json
        fields:
          - { label: Tajuk Meta (SEO), name: metaTitle, widget: string }
          - { label: Hero eyebrow, name: heroEyebrow, widget: string }
          - { label: 'Hero tajuk baris 1', name: heroLine1, widget: string }
          - { label: 'Hero tajuk baris emas', name: heroAccent, widget: string }
          - { label: Hero sub, name: heroSub, widget: text }
          - { label: 'Asas: eyebrow', name: researchEyebrow, widget: string }
          - { label: 'Asas: tajuk', name: researchHeading, widget: string }
          - { label: 'Asas: perenggan 1', name: researchBody1, widget: text }
          - { label: 'Asas: perenggan 2', name: researchBody2, widget: text }
          - { label: 'CTA: tajuk', name: ctaHeading, widget: string }
          - { label: 'CTA: penerangan', name: ctaBody, widget: text }
          - { label: 'CTA: butang utama', name: ctaPrimary, widget: string }
          - { label: 'CTA: butang kedua', name: ctaSecondary, widget: string }

      - name: kajianKesPage
        label: Halaman Kajian Kes
        file: src/content/data/pages/kajian-kes.json
        fields:
          - { label: Tajuk Meta (SEO), name: metaTitle, widget: string }
          - { label: Hero eyebrow, name: heroEyebrow, widget: string }
          - { label: 'Hero tajuk baris 1', name: heroLine1, widget: string }
          - { label: 'Hero tajuk baris emas', name: heroAccent, widget: string }
          - { label: Hero sub, name: heroSub, widget: text }
          - { label: 'Label: Cabaran', name: labelCabaran, widget: string }
          - { label: 'Label: Pendekatan', name: labelPendekatan, widget: string }
          - { label: Nota kerahsiaan, name: disclaimer, widget: text }
          - { label: 'CTA: tajuk', name: ctaHeading, widget: string }
          - { label: 'CTA: penerangan', name: ctaBody, widget: text }
          - { label: 'CTA: butang utama', name: ctaPrimary, widget: string }
          - { label: 'CTA: butang kedua', name: ctaSecondary, widget: string }

      - name: artikelPage
        label: Halaman Wawasan & Artikel
        file: src/content/data/pages/artikel.json
        fields:
          - { label: Tajuk Meta (SEO), name: metaTitle, widget: string }
          - { label: Hero eyebrow, name: heroEyebrow, widget: string }
          - { label: 'Hero tajuk baris 1', name: heroLine1, widget: string }
          - { label: 'Hero tajuk baris emas', name: heroAccent, widget: string }
          - { label: Hero sub, name: heroSub, widget: text }
          - { label: 'Tumpuan: eyebrow', name: topicsEyebrow, widget: string }
          - { label: 'Tumpuan: tajuk', name: topicsHeading, widget: string }
