      - name: programDetail
        label: Halaman Butiran Program (kongsi 6)
        file: src/content/data/pages/program-detail.json
        description: Tajuk seksyen yang dikongsi oleh kesemua 6 halaman butiran program.
        fields:
          - { label: Pautan kembali, name: backLink, widget: string }
          - { label: Hero eyebrow, name: heroEyebrow, widget: string }
          - { label: 'Modul: eyebrow', name: modulesEyebrow, widget: string }
